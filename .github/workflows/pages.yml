name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this if you are using a different branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # Build steps can be added here if needed, for example, for static site generators like Jekyll, Hugo, etc.
      # If not, you can directly deploy as below

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Use the built-in token for authentication
          publish_dir: ./  # Adjust this to the directory that contains the files to be deployed (usually './public' or similar)
